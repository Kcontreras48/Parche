<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - El Parche Mundialista</title>
    <link rel="icon" type="image/png" href="icono.png">
    <style>
        /* PALETA DE COLORES OSCUROS */
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .header-section {
            text-align: center;
            margin-bottom: 25px;
        }
        .header-section h1 { 
            margin: 0; 
            color: #ffffff; 
            font-size: 28px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        /* ESTILOS DE LAS PESTAÑAS (MENÚS) */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        .tab-btn {
            background: #2c2c2c;
            color: #aaaaaa;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .tab-btn:hover { 
            background: #3a3a3a; 
            color: #ffffff; 
        }
        .tab-btn.active {
            background: #28a745;
            color: white;
            box-shadow: 0 2px 8px rgba(40, 167, 69, 0.4);
        }
        
        .tab-content { 
            display: none; 
        }
        .tab-content.active { 
            display: block; 
        }

        /* ESTILOS DE LAS TABLAS (CLASIFICACIÓN Y AUDITORÍA) */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: #1e1e1e;
            border-radius: 6px;
            overflow: hidden;
        }
        th, td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th { 
            background-color: #2c2c2c; 
            color: #ffffff; 
            font-weight: bold; 
        }
        tbody tr:nth-child(even) {
            background-color: #232323;
        }
        tbody tr:nth-child(odd) {
            background-color: #1e1e1e;
        }
        td.centro, th.centro { 
            text-align: center; 
        }
        tr:hover { 
            background-color: #2e2e2e; 
        }
        
        /* Estilos de las Posiciones del Podio */
        .pos-1 { color: #ffd700; font-weight: bold; } 
        .pos-2 { color: #c0c0c0; font-weight: bold; } 
        .pos-3 { color: #cd7f32; font-weight: bold; } 

        /* TARJETAS DE RESULTADOS REALES (CONTENEDORES) */
        .partido-card {
            background: #252525;
            margin-bottom: 14px;
            border-radius: 8px;
            border: 1px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .partido-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            text-align: left;
            cursor: pointer;
            padding: 16px 18px;
            font: inherit;
        }
        .partido-summary:hover {
            background: #2d2d2d;
        }
        .partido-summary h3 {
            margin: 0;
            font-size: 16px;
        }
        .partido-details {
            border-top: 1px solid #333;
            padding: 12px 14px 18px;
            display: none;
            background: #1c1c1c;
        }
        .partido-card.open .partido-details {
            display: block;
        }
        .partido-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #28a745;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 13px;
        }
        .partido-chip.pending {
            background: #555555;
        }
        .partido-header {
            text-align: center;
            margin-bottom: 15px;
        }
        .partido-header h3 {
            margin: 5px 0;
            color: #ffffff;
            font-size: 18px;
        }
        .badge-resultado {
            background: #28a745;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            display: inline-block;
            margin-top: 5px;
        }
        
        .loading { 
            text-align: center; 
            color: #888888; 
            padding: 20px; 
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>📊 Panel de Control Oficial - El Parche Mundialista</h1>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('clasificacion-tab', this)">🏆 Clasificación</button>
        <button class="tab-btn" onclick="switchTab('resultados-tab', this)">👁️ Auditoría por Partido</button>
    </div>

    <div id="clasificacion-tab" class="tab-content active">
        <table>
            <thead>
                <tr>
                    <th class="centro" style="width: 15%;">Posición</th>
                    <th style="width: 65%;">Participante</th>
                    <th class="centro" style="width: 20%;">Puntos Totales</th>
                </tr>
            </thead>
            <tbody id="tabla-clasificacion">
                <tr><td colspan="3" class="loading">Cargando clasificación general...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="resultados-tab" class="tab-content">
        <div id="lista-resultados">
            <p class="loading">Cargando planillas de auditoría de los partidos...</p>
        </div>
    </div>
</div>

<script>
    function switchTab(tabId, button) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        const targetTab = document.getElementById(tabId);
        if (targetTab) targetTab.classList.add('active');
        if (button) button.classList.add('active');
    }

    document.addEventListener("DOMContentLoaded", function() {
        const diccionarioParticipantes = {
            "K2468": "Daniel", "J3124": "Julian", "R0612": "Rocio", "O2010": "Oscar",
            "S2813": "Chape", "S0904": "Salo y Samu", "C7534": "Cristian", 
            "L1593": "Luz marina", "J2010": "Jorge", "S8152": "Tefita y Miriam", 
            "F2345": "Kiko", "L0707": "Chuchin", "M0110": "Mateo y Erika", 
            "E9877": "Efrita", "J1234": "Jesus", "F1212": "Flor", "M3467": "Ahijados"
        };

        const traductorEquipos = {
            "united states": "usa", "korea republic": "south korea", "czechia": "czech republic",
            "bosnia and herzegovina": "bosnia-herzegovina", "turkiye": "turkey",
            "cote d'ivoire": "ivory coast", "cape verde": "cape verde", "cabo verde": "cape verde",
            "dr congo": "dr congo", "congo dr": "dr congo"
        };

        function normalizarNombre(nombre) {
            let n = nombre.toLowerCase().trim();
            if(traductorEquipos[n]) n = traductorEquipos[n];
            return n.replace(/ /g, '_');
        }

        function calcularPuntosPartido(predLocal, predVisitante, golesLocalReal, golesVisitanteReal) {
            if (!Number.isFinite(golesLocalReal) || !Number.isFinite(golesVisitanteReal)) {
                return 0;
            }

            if (predLocal === golesLocalReal && predVisitante === golesVisitanteReal) {
                return 6;
            }

            const resultadoPredicho = predLocal === predVisitante
                ? 0
                : predLocal > predVisitante ? 1 : -1;
            const resultadoReal = golesLocalReal === golesVisitanteReal
                ? 0
                : golesLocalReal > golesVisitanteReal ? 1 : -1;

            return resultadoPredicho === resultadoReal ? 3 : 0;
        }

        Promise.all([
            fetch('predicciones_locales.json').then(res => res.json()),
            fetch('marcadores_reales.json').then(res => res.json())
        ]).then(([prediccionesWeb, marcadoresReales]) => {
            
            // Inicialización de los puntajes acumulados
            let puntosAcumulados = {};
            Object.keys(diccionarioParticipantes).forEach(k => puntosAcumulados[k] = 0);

            let auditoriaHTML = '';
            let llavesFormulario = (prediccionesWeb.length > 0) ? Object.keys(prediccionesWeb[0].form_data) : [];

            marcadoresReales.forEach(partido => {
                let loc_clean = normalizarNombre(partido.local_nombre);
                let vis_clean = normalizarNombre(partido.visitante_nombre);

                let col_L = llavesFormulario.find(k => k.toLowerCase() === `p_${loc_clean}_vs_${vis_clean}_local`);
                let col_V = llavesFormulario.find(k => k.toLowerCase() === `p_${loc_clean}_vs_${vis_clean}_visitante`);

                const cardOpen = '';
                const estadoChip = partido.finalizado ? 'Marcador: ' + partido.marcador_real : '⚽ Partido por Jugar';
                const chipClass = partido.finalizado ? '' : 'pending';

                let tablaPartido = `<div class="partido-card ${cardOpen}">
                    <button class="partido-summary" type="button" onclick="this.closest('.partido-card').classList.toggle('open')" aria-expanded="false">
                        <span>
                            <h3>${partido.titulo}</h3>
                            <div style="font-size:12px; color:#bdbdbd; margin-top:4px;">${partido.finalizado ? 'Ver detalle del partido' : 'Sin marcador aún'}</div>
                        </span>
                        <span class="partido-chip ${chipClass}">${estadoChip}</span>
                    </button>
                    <div class="partido-details">
                    <table style="width:100%; border-collapse:collapse; background:#1e1e1e; margin-top:0;">
                    <thead><tr style="background:#2c2c2c; color:white;"><th style="padding:10px 8px;">Participante</th><th class="centro" style="padding:10px 6px;">Predicción</th><th class="centro" style="padding:10px 6px;">Puntos</th></tr></thead><tbody>`;

                Object.entries(diccionarioParticipantes).forEach(([codigo, nombre]) => {
                    let formUser = prediccionesWeb.find(p => p.form_data.codigo_usuario?.toUpperCase() === codigo);
                    let puntos_partido = 0;
                    let pred_texto = "—";

                    if(formUser && col_L && col_V) {
                        let p_L = parseInt(formUser.form_data[col_L]);
                        let p_V = parseInt(formUser.form_data[col_V]);

                        if(!isNaN(p_L) && !isNaN(p_V)) {
                            pred_texto = `${p_L} - ${p_V}`;
                            puntos_partido = calcularPuntosPartido(
                                p_L,
                                p_V,
                                partido.finalizado ? partido.goles_L_real : null,
                                partido.finalizado ? partido.goles_V_real : null
                            );
                        }
                    }

                    puntosAcumulados[codigo] += puntos_partido;

                    let colorPuntos = puntos_partido > 0 ? '#28a745' : '#888888';
                    let estiloFila = (puntos_partido === 6) ? 'style="font-weight:bold; color:#ffd700; background: rgba(40,167,69,0.08);"' : '';

                    const colorPuntosVistoso = puntos_partido > 0 ? '#39d353' : '#888888';

                    tablaPartido += `<tr ${estiloFila}><td style="padding:8px 6px;"><strong>${nombre}</strong></td>
                    <td class="centro" style="padding:8px 4px;">${pred_texto}</td>
                    <td class="centro" style="padding:8px 4px;"><span style="color:${colorPuntosVistoso}; font-weight:bold; text-shadow: 0 0 3px rgba(57, 211, 83, 0.25);">+${puntos_partido} pts</span></td></tr>`;
                });

                auditoriaHTML += tablaPartido + `</tbody></table></div></div>`;
            });

            document.getElementById('lista-resultados').innerHTML = auditoriaHTML;

            // Clasificación final ordenada con posiciones compartidas en empates
            let ranking = Object.keys(diccionarioParticipantes)
                .map(cod => ({codigo: cod, nombre: diccionarioParticipantes[cod], puntos: puntosAcumulados[cod]}))
                .sort((a, b) => b.puntos - a.puntos);

            let posicionActual = 1;
            const rankingConPosicion = ranking.map((j, i) => {
                const hayEmpateConAnterior = i > 0 && ranking[i - 1].puntos === j.puntos;
                if (!hayEmpateConAnterior) {
                    posicionActual = i + 1;
                }
                return { ...j, posicion: posicionActual };
            });

            document.getElementById('tabla-clasificacion').innerHTML = rankingConPosicion.map((j) => `
                <tr>
                    <td class="centro ${j.posicion <= 3 ? 'pos-' + j.posicion : ''}">${j.posicion}</td>
                    <td><strong>${j.nombre}</strong></td>
                    <td class="centro" style="color:#28a745; font-weight:bold;">${j.puntos} pts</td>
                </tr>`).join('');
        });
    });
</script>
    
</body>
</html>
