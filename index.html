<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - El Parche Mundialista</title>
    <link rel="icon" type="image/png" href="icono.png">
    <style>
        /* PALETA DE COLORES OSCUROS */
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .header-section {
            text-align: center;
            margin-bottom: 25px;
        }
        .header-section h1 { 
            margin: 0; 
            color: #ffffff; 
            font-size: 28px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        /* ESTILOS DE LAS PESTAÑAS (MENÚS) */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        .tab-btn {
            background: #2c2c2c;
            color: #aaaaaa;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .tab-btn:hover { 
            background: #3a3a3a; 
            color: #ffffff; 
        }
        .tab-btn.active {
            background: #28a745;
            color: white;
            box-shadow: 0 2px 8px rgba(40, 167, 69, 0.4);
        }
        
        .tab-content { 
            display: none; 
        }
        .tab-content.active { 
            display: block; 
        }

        /* ESTILOS DE LAS TABLAS (CLASIFICACIÓN Y AUDITORÍA) */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: #1e1e1e;
            border-radius: 6px;
            overflow: hidden;
        }
        th, td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th { 
            background-color: #2c2c2c; 
            color: #ffffff; 
            font-weight: bold; 
        }
        td.centro, th.centro { 
            text-align: center; 
        }
        tr:hover { 
            background-color: #2e2e2e; 
        }
        
        /* Estilos de las Posiciones del Podio */
        .pos-1 { color: #ffd700; font-weight: bold; } 
        .pos-2 { color: #c0c0c0; font-weight: bold; } 
        .pos-3 { color: #cd7f32; font-weight: bold; } 

        /* TARJETAS DE RESULTADOS REALES (CONTENEDORES) */
        .partido-card {
            background: #252525;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
            border: 1px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .partido-header {
            text-align: center;
            margin-bottom: 15px;
        }
        .partido-header h3 {
            margin: 5px 0;
            color: #ffffff;
            font-size: 18px;
        }
        .badge-resultado {
            background: #28a745;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            display: inline-block;
            margin-top: 5px;
        }
        
        .loading { 
            text-align: center; 
            color: #888888; 
            padding: 20px; 
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>📊 Panel de Control Oficial - El Parche Mundialista</h1>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('clasificacion-tab', this)">🏆 Clasificación</button>
        <button class="tab-btn" onclick="switchTab('resultados-tab', this)">👁️ Auditoría por Partido</button>
    </div>

    <div id="clasificacion-tab" class="tab-content active">
        <table>
            <thead>
                <tr>
                    <th class="centro" style="width: 12%;">Posición</th>
                    <th style="width: 48%;">Participante</th>
                    <th class="centro" style="width: 20%;">Código</th>
                    <th class="centro" style="width: 20%;">Puntos Totales</th>
                </tr>
            </thead>
            <tbody id="tabla-clasificacion">
                <tr><td colspan="4" class="loading">Cargando clasificación general...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="resultados-tab" class="tab-content">
        <div id="lista-resultados">
            <p class="loading">Cargando planillas de auditoría de los partidos...</p>
        </div>
    </div>
</div>

<script>
    // Función para cambiar de pestaña en el menú
function switchTab(tabId, button) {
    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    
    const targetTab = document.getElementById(tabId);
    if (targetTab) targetTab.classList.add('active');
    if (button) button.classList.add('active');
}

document.addEventListener("DOMContentLoaded", function() {

    // Diccionario Oficial de Participantes movido al Frontend
    const diccionarioParticipantes = {
        "K2468": "Kevin", "J3124": "Julian", "R0612": "Albita", "O2010": "Oscar",
        "S2813": "Chape", "S0904": "Samuel y Salome", "C7534": "Cristian", 
        "L1593": "Luz marina", "J2010": "Jorge", "S8152": "Luz y Tefita", 
        "F2345": "Kiko", "L0707": "Chuchin", "M0110": "Mateo y Erika", 
        "E9877": "Efrita", "J1234": "Jesus", "F1212": "Flor", "M3467": "Matias y Dilan"
    };

    // Obtenemos los dos JSONs al mismo tiempo de tu repositorio
    Promise.all([
        fetch('predicciones_locales.json').then(res => res.json()),
        fetch('marcadores_reales.json').then(res => res.json())
    ]).then(([prediccionesWeb, marcadoresReales]) => {
        
        // 1. INICIALIZAMOS LOS CONTADORES DE PUNTOS
        let puntosAcumulados = {};
        for(let key in diccionarioParticipantes) puntosAcumulados[key] = 0;

        let auditoriaHTML = '';

        // Obtenemos las llaves del primer formulario válido para hacer el escaneo de nombres de equipos
        let llavesFormulario = [];
        if(prediccionesWeb.length > 0 && prediccionesWeb[0].form_data) {
            llavesFormulario = Object.keys(prediccionesWeb[0].form_data);
        }

        // 2. MOTOR DE CÁLCULO Y DIBUJO DE TARJETAS
        marcadoresReales.forEach(partido => {
            // Escaneo difuso de nombres de equipos (Igual que se hacía en Python pero en JS)
            let loc_clean = partido.local_nombre.toLowerCase().replace(/ /g, '_');
            let vis_clean = partido.visitante_nombre.toLowerCase().replace(/ /g, '_');

            let col_L = null, col_V = null;
            for(let key of llavesFormulario) {
                let kLower = key.toLowerCase();
                if(kLower.includes(loc_clean) && kLower.includes(vis_clean)) {
                    if(kLower.endsWith('_local')) col_L = key;
                    else if(kLower.endsWith('_visitante')) col_V = key;
                }
            }

            let tendencia_real = null;
            if(partido.finalizado) {
                if(partido.goles_L_real > partido.goles_V_real) tendencia_real = "Local";
                else if(partido.goles_L_real < partido.goles_V_real) tendencia_real = "Visitante";
                else tendencia_real = "Empate";
            }

            let badgeColor = partido.finalizado ? '#28a745' : '#555555';
            let textoBadge = partido.finalizado ? `Marcador Real: ${partido.marcador_real}` : '⚽ Partido por Jugar';

            let tablaPartido = `
                <div class="partido-card">
                    <div class="partido-header">
                        <h3>${partido.titulo}</h3>
                        <span class="badge-resultado" style="background:${badgeColor}">${textoBadge}</span>
                    </div>
                    <table style="width:100%; border-collapse:collapse; background:#1e1e1e;">
                        <thead>
                            <tr style="background:#2c2c2c; color:white;">
                                <th style="padding:10px;">Participante</th>
                                <th class="centro" style="padding:10px;">Predicción</th>
                                <th class="centro" style="padding:10px;">Puntos Ganados</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            // Calculamos puntos para cada participante
            for(let [codigo, nombre] of Object.entries(diccionarioParticipantes)) {
                // Buscamos si la persona llenó el formulario
                let formUser = prediccionesWeb.find(p => p.form_data && p.form_data.codigo_usuario && p.form_data.codigo_usuario.toUpperCase() === codigo);
                
                let pred_texto = "—";
                let puntos_ganados = 0;

                if(formUser && col_L && col_V) {
                    let val_L = formUser.form_data[col_L];
                    let val_V = formUser.form_data[col_V];

                    if(val_L !== undefined && val_L !== "" && val_V !== undefined && val_V !== "") {
                        let p_L = parseInt(val_L);
                        let p_V = parseInt(val_V);

                        if(!isNaN(p_L) && !isNaN(p_V)) {
                            pred_texto = `${p_L} - ${p_V}`;

                            if(partido.finalizado) {
                                let tendencia_pred = "Empate";
                                if(p_L > p_V) tendencia_pred = "Local";
                                else if(p_L < p_V) tendencia_pred = "Visitante";

                                // +3 por atinarle a la tendencia (ganador o empate)
                                if(tendencia_real === tendencia_pred) {
                                    puntos_ganados += 3;
                                    // +3 adicionales por marcador exacto
                                    if(p_L === partido.goles_L_real && p_V === partido.goles_V_real) {
                                        puntos_ganados += 3;
                                    }
                                }
                                puntosAcumulados[codigo] += puntos_ganados;
                            }
                        } else {
                            pred_texto = "Inválido";
                        }
                    }
                }

                // Generar los estilos dinámicos de los puntos (Dorado si sacó 6 pts)
                let puntosPintados = "";
                let estiloFila = "";
                
                if(partido.finalizado) {
                    let colorPuntos = puntos_ganados > 0 ? '#28a745' : '#888888';
                    puntosPintados = `<span style="color:${colorPuntos}; font-weight:bold;">+${puntos_ganados} pts</span>`;
                    if(puntos_ganados === 6) estiloFila = 'style="font-weight:bold; color:#ffd700; background: rgba(40,167,69,0.08);"';
                } else {
                    puntosPintados = `<span style="color:#6c757d; font-style:italic;">Pendiente</span>`;
                }

                tablaPartido += `
                    <tr ${estiloFila}>
                        <td style="padding:10px; border-bottom:1px solid #333;"><strong>${nombre}</strong></td>
                        <td class="centro" style="padding:10px; border-bottom:1px solid #333; color:#fff;">${pred_texto}</td>
                        <td class="centro" style="padding:10px; border-bottom:1px solid #333;">${puntosPintados}</td>
                    </tr>
                `;
            }

            tablaPartido += `</tbody></table></div>`;
            auditoriaHTML += tablaPartido;
        });

        // Imprimimos toda la auditoría en pantalla
        const listaResultados = document.getElementById('lista-resultados');
        if (listaResultados) listaResultados.innerHTML = auditoriaHTML;

        // 3. ORDENAR Y DIBUJAR LA CLASIFICACIÓN GENERAL
        let rankingArray = Object.keys(diccionarioParticipantes).map(cod => {
            return { codigo: cod, nombre: diccionarioParticipantes[cod], puntos: puntosAcumulados[cod] };
        });

        // Ordenamos de mayor a menor según los puntos calculados
        rankingArray.sort((a, b) => b.puntos - a.puntos);

        let clasificacionHTML = '';
        rankingArray.forEach((jugador, index) => {
            const pos = index + 1;
            let posClass = 'class="centro"';
            
            if(pos === 1) posClass = 'class="pos-1 centro"';
            else if(pos === 2) posClass = 'class="pos-2 centro"';
            else if(pos === 3) posClass = 'class="pos-3 centro"';

            clasificacionHTML += `
                <tr>
                    <td ${posClass}>${pos}</td>
                    <td><strong>${jugador.nombre}</strong></td>
                    <td class="centro" style="color: #888888;">${jugador.codigo}</td>
                    <td class="centro" style="color: #28a745; font-weight: bold;">${jugador.puntos} pts</td>
                </tr>
            `;
        });

        const tablaClasi = document.getElementById('tabla-clasificacion');
        if(tablaClasi) tablaClasi.innerHTML = clasificacionHTML;

    }).catch(err => {
        console.error("Error procesando los datos:", err);
        document.getElementById('tabla-clasificacion').innerHTML = `
            <tr><td colspan="4" style="color:#ff4c4c; text-align:center;">
                Error renderizando los datos. Revisa la consola (F12).
            </td></tr>`;
        document.getElementById('lista-resultados').innerHTML = `
            <p style="color:#ff4c4c; text-align:center;">No se pudieron cargar los partidos.</p>`;
    });
});
</script>

</body>
</html>
